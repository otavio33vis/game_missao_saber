<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão Saber</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Login ── */
    #tela-login { justify-content:flex-end; align-items:center; padding-bottom:60px; }
    .login-btns { display:flex; flex-direction:column; align-items:center; gap:14px; width:100%; max-width:340px; }

    /* ── Modal aluno ── */
    #modal-dados { display:none; position:fixed; inset:0; z-index:150; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); }
    #modal-dados.ativo { display:flex; }
    #modal-dados .modal-box { background:rgba(10,10,30,0.95); border:1px solid rgba(237,178,26,0.4); border-radius:20px; padding:36px 32px; width:100%; max-width:400px; box-shadow:0 0 40px rgba(237,178,26,0.2); animation:popIn 0.3s ease; }
    #modal-dados h3 { font-family:var(--fonte-titulo); color:var(--cor-ouro); font-size:1.4rem; text-align:center; margin-bottom:24px; }

    /* ── Mapa ── */
    #tela-mapa .mapa-content { display:flex; flex-direction:column; align-items:center; gap:24px; padding:40px 20px; }
    .mapa-blocos { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
    .bloco-mundo { width:220px; height:220px; border-radius:24px; border:3px solid rgba(255,255,255,0.2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; cursor:pointer; transition:transform .3s,box-shadow .3s,border-color .3s; position:relative; overflow:hidden; background-size:contain; background-position:center; }
    .bloco-mundo::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.45); transition:background .3s; }
    .bloco-mundo:hover { transform:translateY(-8px) scale(1.04); box-shadow:0 16px 50px rgba(237,178,26,0.5); border-color:var(--cor-ouro); animation:pulse-bloco 1.5s ease-in-out infinite; }
    @keyframes pulse-bloco { 0%,100%{box-shadow:0 16px 50px rgba(237,178,26,0.5)} 50%{box-shadow:0 16px 60px rgba(237,178,26,0.8)} }
    .bloco-mundo:hover::before { background:rgba(0,0,0,0.2); }
    .bloco-mundo.completo { border-color:var(--cor-verde); }
    .bloco-mundo.completo::after { content:'✓'; position:absolute; top:10px; right:14px; color:var(--cor-verde); font-size:1.4rem; font-weight:900; z-index:2; }
    .bloco-mundo>* { position:relative; z-index:1; }
    .bloco-nome { font-family:var(--fonte-titulo); font-size:1.4rem; letter-spacing:2px; text-shadow:2px 2px 0 rgba(0,0,0,0.9); }
    .bloco-nota { font-size:0.85rem; font-weight:700; color:var(--cor-ouro); background:rgba(0,0,0,0.7); padding:4px 12px; border-radius:20px; }
    .bloco-icone { font-size:2.5rem; }
    .mapa-aluno { font-size:1rem; color:rgba(255,255,255,0.8); font-weight:700; background:rgba(0,0,0,0.4); padding:8px 20px; border-radius:20px; }

    /* ── Quiz ── */
    #tela-quiz { align-items:stretch; padding:0; }
    .quiz-layout { display:flex; flex-direction:column; min-height:100vh; width:100%; padding:20px; gap:16px; }
    .quiz-header { display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .quiz-mundo-tag { font-family:var(--fonte-titulo); font-size:0.9rem; letter-spacing:2px; color:var(--cor-tema-botao,var(--cor-ouro)); background:rgba(0,0,0,0.5); padding:6px 16px; border-radius:20px; }
    #quiz-contador { font-weight:800; font-size:0.9rem; color:rgba(255,255,255,0.7); }
    #quiz-img-box { display:none; text-align:center; }
    #quiz-img { max-height:180px; max-width:100%; border-radius:12px; object-fit:contain; }
    #quiz-pergunta { font-size:clamp(1rem,2.5vw,1.3rem); font-weight:700; line-height:1.5; background:rgba(0,0,0,0.65); padding:20px; border-radius:16px; border-left:4px solid var(--cor-tema-botao,var(--cor-ouro)); }
    #quiz-alternativas { display:flex; flex-direction:column; gap:10px; flex:1; }
    .btn-alternativa { display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:14px; border:2px solid rgba(255,255,255,0.15); background:var(--cor-tema-botao,rgba(255,255,255,0.08)); color:var(--cor-tema-texto,#fff); font-family:var(--fonte-corpo); font-size:0.95rem; font-weight:700; cursor:pointer; text-align:left; transition:transform .2s,border-color .2s,background .2s; }
    .btn-alternativa:hover:not(:disabled) { transform:translateX(4px); border-color:rgba(255,255,255,0.4); }
    .btn-alternativa:disabled { cursor:default; }
    .btn-alternativa.correta { background:var(--cor-verde)!important; border-color:var(--cor-verde)!important; color:#fff!important; transform:translateX(4px); }
    .btn-alternativa.errada  { background:var(--cor-vermelho)!important; border-color:var(--cor-vermelho)!important; color:#fff!important; }
    .badge-letra { min-width:32px; height:32px; background:var(--cor-tema-badge,#000); color:var(--cor-tema-texto,#fff); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:var(--fonte-titulo); font-size:0.9rem; flex-shrink:0; }
    .btn-menu-quiz { background:rgba(0,0,0,0.5); border:2px solid rgba(255,255,255,0.2); color:#fff; padding:8px 16px; border-radius:20px; cursor:pointer; font-family:var(--fonte-titulo); font-size:0.85rem; transition:border-color .2s; width:auto; }
    .btn-menu-quiz:hover { border-color:var(--cor-ouro); color:var(--cor-ouro); }

    /* ── Resultado Mundo ── */
    #tela-resultado-mundo .res-content { text-align:center; display:flex; flex-direction:column; align-items:center; gap:16px; padding:40px 20px; }
    #res-mundo-nota { font-family:var(--fonte-titulo); font-size:5rem; color:var(--cor-ouro); text-shadow:4px 4px 0 rgba(0,0,0,0.5),0 0 40px rgba(237,178,26,0.5); line-height:1; }
    .res-label { font-size:0.8rem; font-weight:700; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:2px; }

    /* ── Ranking ── */
    .ranking-box { width:100%; max-width:380px; background:rgba(0,0,0,0.5); border:1px solid rgba(237,178,26,0.3); border-radius:16px; padding:16px 20px; }
    .ranking-titulo { font-family:var(--fonte-titulo); font-size:1rem; color:var(--cor-ouro); letter-spacing:2px; text-align:center; margin-bottom:12px; }
    .ranking-lista { display:flex; flex-direction:column; gap:8px; }
    .ranking-item { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.05); border-radius:10px; padding:8px 14px; border:1px solid transparent; transition:border-color .2s; }
    .ranking-item.destaque { border-color:var(--cor-ouro); background:rgba(237,178,26,0.12); }
    .ranking-pos { font-size:1.4rem; min-width:28px; text-align:center; }
    .ranking-nome { flex:1; font-weight:700; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ranking-media { font-family:var(--fonte-titulo); font-size:1rem; color:var(--cor-ouro); }
    .ranking-item.destaque .ranking-media { color:#fff; }
    .ranking-vazio { text-align:center; font-size:0.85rem; color:rgba(255,255,255,0.4); padding:8px 0; }

    /* ── Resultado Final ── */
    #tela-resultado-final .res-final-content { text-align:center; display:flex; flex-direction:column; align-items:center; gap:20px; padding:40px 20px; max-width:560px; }
    #res-final-media { font-family:var(--fonte-titulo); font-size:4rem; color:var(--cor-ouro); text-shadow:3px 3px 0 rgba(0,0,0,0.5); }
    #res-final-status { font-family:var(--fonte-titulo); font-size:1.8rem; letter-spacing:2px; }
    .detalhes-materia { display:flex; flex-direction:column; gap:10px; width:100%; }
    .detalhe-item { display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.06); border-radius:12px; padding:12px 20px; border-left:4px solid var(--cor-ouro); }
    .detalhe-item.mat { border-color:var(--cor-mat); }
    .detalhe-item.port { border-color:var(--cor-port); }
    .detalhe-nome { font-weight:800; font-size:1rem; }
    .detalhe-nota { font-family:var(--fonte-titulo); font-size:1.3rem; color:var(--cor-ouro); }
    .res-final-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }
  </style>
</head>
<body>

<!-- POPUP GLOBAL -->
<div id="popup-overlay" class="popup-overlay">
  <div class="popup-box">
    <p id="popup-txt"></p>
    <div class="popup-btns">
      <button id="popup-sim" class="btn btn-vermelho">SIM</button>
      <button id="popup-nao" class="btn btn-verde">NÃO</button>
    </div>
  </div>
</div>

<!-- MODAL ALUNO -->
<div id="modal-dados">
  <div class="modal-box">
    <h3>🎓 Quem é você?</h3>
    <div class="input-group">
      <label>Seu Nome *</label>
      <input type="text" id="input-nome" placeholder="Digite seu nome completo" maxlength="50">
    </div>
    <div class="input-group">
      <label>Código da Turma (opcional)</label>
      <input type="text" id="input-turma" placeholder="Ex: 1234" maxlength="6">
    </div>
    <button class="btn btn-ouro" onclick="Aluno.confirmarDados()" style="margin-bottom:10px">▶ JOGAR</button>
    <button class="btn btn-ghost" onclick="Aluno.fecharModal()">← Cancelar</button>
  </div>
</div>

<!-- TELA 1 — LOGIN -->
<section id="tela-login" class="tela ativa">
  <div class="fundo-img" style="background-image:url('assets/imagens/menu.png');background-size:cover;background-position:center"></div>
  <div class="login-btns fade-enter" style="position:absolute;bottom:30%;left:50%;transform:translateX(-50%);z-index:2;width:auto">
    <button class="btn btn-ouro" style="font-size:1.3rem;padding:18px 48px"
            onclick="Aluno.abrirModal()">▶ JOGAR</button>
    <button class="btn btn-ghost"
            onclick="window.location.href='professor.html'">👨‍🏫 Modo Professor</button>
  </div>
</section>

<!-- TELA 2 — MAPA -->
<section id="tela-mapa" class="tela">
  <div class="fundo-img" style="background-image:url('assets/imagens/menu.png')"></div>
  <div class="mapa-content">
    <p class="mapa-aluno" id="mapa-aluno-nome"></p>
    <div class="mapa-blocos">
      <div class="bloco-mundo" id="bloco-matematica"
           style="background-image:url('assets/imagens/quiz_matematica.png')"
           onclick="Mapa.iniciarMundo('matematica')">
        <div class="bloco-icone">📐</div>
        <div class="bloco-nome">MATEMÁTICA</div>
        <div class="bloco-nota" id="nota-matematica" style="display:none"></div>
      </div>
      <div class="bloco-mundo" id="bloco-portugues"
           style="background-image:url('assets/imagens/quiz_historia.png')"
           onclick="Mapa.iniciarMundo('portugues')">
        <div class="bloco-icone">📖</div>
        <div class="bloco-nome">PORTUGUÊS</div>
        <div class="bloco-nota" id="nota-portugues" style="display:none"></div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-ouro" style="width:auto;padding:12px 28px"
              onclick="ResultadoFinal.exibir()">🏆 Resultado Final</button>
      <button class="btn btn-ghost" style="width:auto;padding:12px 28px"
              onclick="Aluno.confirmarSairMenu()">← Menu</button>
    </div>
  </div>
</section>

<!-- TELA 3 — QUIZ -->
<section id="tela-quiz" class="tela">
  <div class="fundo-img" id="quiz-fundo"></div>
  <div class="quiz-layout">
    <div class="quiz-header">
      <div class="quiz-mundo-tag" id="quiz-mundo-tag">MATEMÁTICA</div>
      <div class="progress-bar" style="flex:1;margin:0">
        <div class="progress-fill" id="quiz-progress" style="width:0%"></div>
      </div>
      <span id="quiz-contador">1 / 10</span>
      <button class="btn btn-menu-quiz" onclick="Aluno.confirmarSairQuiz()">☰ MENU</button>
    </div>
    <div id="quiz-img-box"><img id="quiz-img" src="" alt="Imagem da questão"></div>
    <div id="quiz-pergunta"></div>
    <div id="quiz-alternativas"></div>
  </div>
</section>

<!-- TELA 4 — RESULTADO MUNDO -->
<section id="tela-resultado-mundo" class="tela">
  <div class="fundo-img" id="res-mundo-fundo"></div>
  <div class="res-content">
    <h2 id="res-mundo-nome">MATEMÁTICA</h2>
    <div class="res-label">NOTA</div>
    <div id="res-mundo-nota">0</div>
    <div class="estrelas" id="res-mundo-estrelas">★</div>
    <p id="res-mundo-msg" style="font-size:1.2rem;font-weight:700"></p>
    <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;margin-top:8px">
      <button class="btn btn-ouro" onclick="Mapa.voltar()">🌍 Próximo Mundo</button>
      <button class="btn btn-ghost" onclick="ResultadoFinal.exibir()">🏆 Resultado Final</button>
      <button class="btn btn-ghost" onclick="Aluno.confirmarSairMenu()">← Menu</button>
    </div>
  </div>
</section>

<!-- TELA 5 — RESULTADO FINAL -->
<section id="tela-resultado-final" class="tela">
  <div class="fundo-img" style="background-image:url('assets/imagens/resultado_final.png')"></div>
  <div class="res-final-content card">
    <h1>RESULTADO FINAL</h1>
    <div class="res-label">MÉDIA GERAL</div>
    <div id="res-final-media">0,0</div>
    <div id="res-final-status" style="color:var(--cor-verde)">APROVADO!</div>
    <div class="detalhes-materia" id="res-final-detalhes"></div>
    <div class="ranking-box" id="ranking-turma" style="display:none">
    <div class="ranking-titulo">🏆 TOP DA TURMA</div>
    <div class="ranking-lista" id="ranking-lista"></div>
    </div>
    <div class="res-final-btns">
      <button class="btn btn-ouro" onclick="Aluno.jogarNovamente()">🔄 Jogar Novamente</button>
      <button class="btn btn-ghost" onclick="Aluno.sairParaMenu()">← Menu Principal</button>
    </div>
  </div>
</section>

<!-- Scripts — ordem importa! -->
<script src="js/utils.js"></script>
<script src="js/session.js"></script>
<script src="js/quiz.js"></script>
<script src="js/mapa.js"></script>
<script>
  // Inicializa eventos de teclado e carrega banco ao abrir
  window.addEventListener('DOMContentLoaded', async () => {
    Aluno.init();
    await Quiz.carregarBanco();
  });
  // ── Ranking ──
const Ranking = {
  medalhas: ['🥇','🥈','🥉'],

  async carregar(codigoTurma, nomeAluno) {
    const box  = document.getElementById('ranking-turma');
    const lista = document.getElementById('ranking-lista');
    if (!codigoTurma) { box.style.display = 'none'; return; }

    try {
      const resp = await fetch(`/api/ranking/${encodeURIComponent(codigoTurma)}`);
      const dados = await resp.json();
      const top3 = dados.slice(0, 3);

      if (!top3.length) { box.style.display = 'none'; return; }

      lista.innerHTML = top3.map(a => {
        const ehEu = a.nome.trim().toLowerCase() === nomeAluno.trim().toLowerCase();
        return `
          <div class="ranking-item ${ehEu ? 'destaque' : ''}">
            <span class="ranking-pos">${this.medalhas[a.posicao - 1] ?? a.posicao + 'º'}</span>
            <span class="ranking-nome">${a.nome}${ehEu ? ' (você)' : ''}</span>
            <span class="ranking-media">${Number(a.media).toFixed(1).replace('.',',')}</span>
          </div>`;
      }).join('');

      box.style.display = 'block';
    } catch (e) {
      console.warn('Ranking indisponível:', e);
      box.style.display = 'none';
    }
  }
};
</script>
</body>
</html>
